## 8) 각 섹션 핵심 메시지 1줄 정리

<div className="key-messages">

1. **히어로:** "AI 스터디 20기 얼리버드 D-3, 지금이 가장 저렴해요"
2. **가격:** "10% 할인 종료까지 23시간 15분"
3. **추천 대상:** "당신의 문제, 4주 만에 해결합니다"
4. **커리큘럼:** "주 3시간 투자로 AI 실전 완주"
5. **특별 혜택:** "VOD 무제한 + 전 스터디 청강 가능"
6. **리뷰:** "3,200명이 검증한 실전 변화"
