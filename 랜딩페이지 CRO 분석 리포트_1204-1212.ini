## 6) 섹션별 분석 및 개선안

### 6-1) 히어로 섹션 (0-900px)

#### 현황
- 오렌지 그라데이션 배경, 중앙 정렬
- 헤드라인: "지금 바로 AI 스터디에 참여하세요!"
- 서브 카피: "역대 최대 대기자가 모인 20기, 가장 좋은 혜택으로 만나보세요"
- CTA: "스터디 신청하기 ▶" (118 클릭, 최다)

#### 핵심 메시지
"AI를 혼자 배우기 어렵다면, 4,000명과 함께 20기 스터디 지금 시작"

#### ✅ 잘 되고 있는 점
- 시각적으로 강렬한 그라데이션으로 주목도 확보
- CTA 버튼이 1위 클릭을 기록해 위치/디자인 효과적
- 95% 이상 사용자가 CTA 영역까지 스크롤

#### 💡 개선 기회

| 항목 | 내용 |
|------|------|
| **문제** | 헤드라인이 지나치게 일반적이고 긴급성/혜택이 불명확. "지금 바로"라는 표현만으로는 Why Now가 약함 |
| **가설** | 얼리버드 할인 마감 임박 메시지를 헤드라인에 통합하면 긴급성 증가로 CTA 클릭률 상승 |
| **개선안** | ✅ 헤드라인을 "AI 스터디 20기 얼리버드 마감 D-3 \\| 10% 할인 종료 전 신청하세요"로 변경<br/>✅ 서브 카피에 구체적 숫자 추가: "이미 3,200명이 대기 중 - 30명 한정 모집"<br/>✅ CTA 버튼 문구: "269,000원에 신청하기 (정가 299,000원)" - 가격 명시로 의사결정 용이 |
| **예상 효과** | CTA 클릭률 5.3% → 8~10% 증가 예상 (긴급성+구체적 혜택 강조) |

---

### 6-2) 가격 혜택 섹션 (900-1,500px)

#### 현황
- 3단계 가격 카드 (슈퍼얼리버드 10% / 얼리버드 5% / 정가 0%)
- 각 카드별 기간과 할인율 표시
- 도달률: ~80%

#### 핵심 메시지
"지금 구매하면 30,000원 절약 가능"

#### ✅ 잘 되고 있는 점
- 시각적으로 구분된 그라데이션 카드로 단계별 차별화 명확
- 할인 퍼센트 원형 뱃지가 시선 집중

#### 💡 개선 기회

| 항목 | 내용 |
|------|------|
| **문제** | 현재 어떤 단계인지 불명확. 사용자가 "지금" 어떤 가격인지 즉시 파악 어려움 |
| **가설** | 현재 적용 중인 할인 카드를 시각적으로 강조하고 카운트다운 타이머를 추가하면 긴급 구매 전환율 증가 |
| **개선안** | ✅ 현재 적용 단계 카드에 "🔥 지금 적용 중!" 플래그 추가<br/>✅ 해당 카드만 확대(120% 스케일) + 펄싱 애니메이션<br/>✅ 카드 상단에 "⏰ 00:23:15 남음" 실시간 카운트다운<br/>✅ 종료된 단계는 투명도 50% + "종료" 라벨 |
| **예상 효과** | 섹션 이탈률 감소, 스크롤 계속률 80% → 85% 증가. 긴급성 인지로 즉시 구매 유도 |

---

### 6-3) 추천 대상 섹션 (1,500-2,000px)

#### 현황
- 3개 페르소나 카드 (1인 사업가 / 프리랜서 / AI 입문자)
- 각 카드에 일러스트 + Pain Point 2개씩
- 도달률: ~70%

#### 핵심 메시지
"당신의 문제, AI 스터디로 해결 가능"

#### ✅ 잘 되고 있는 점
- 명확한 타겟 세그먼트 구분
- 감정 이입 가능한 Pain Point 제시

#### 💡 개선 기회

| 항목 | 내용 |
|------|------|
| **문제** | Pain Point는 있지만 "스터디가 어떻게 해결해주는지" Solution이 불명확 |
| **가설** | Pain Point 아래 구체적 Before → After 시나리오를 추가하면 전환 가설 검증 가능 |
| **개선안** | ✅ 각 카드에 "✅ 스터디 후 변화" 섹션 추가<br/>   예시) "반복 업무 주 15시간 → 5시간으로 단축"<br/>✅ 실제 수강생 한 줄 후기 추가<br/>   예시) "프리랜서 김OO: n8n 자동화로 월 200만원 시간 절약" |
| **예상 효과** | 공감 → 신뢰 → 전환 경로 강화. 이탈률 30% → 25% 감소 |

---

### 6-4) 커리큘럼 섹션 (2,000-3,000px)

#### 현황
- 5단계 프로그램 (핵심 강의 / OT / 오프라인 모임 / 사례 발표 / 베스트 발표회)
- 주차별 일정 캘린더
- 도달률: ~50% (이탈 결정 구간)

#### 핵심 메시지
"4주간 체계적인 학습 → 실전 적용까지"

#### ✅ 잘 되고 있는 점
- 시각적 캘린더로 일정 직관적 이해
- 단계별 아이콘으로 프로세스 명확

#### 💡 개선 기회

| 항목 | 내용 |
|------|------|
| **문제** | 정보량이 과도해 50%가 여기서 이탈. 캘린더가 복잡해 보임 |
| **가설** | 핵심 3단계만 상단 노출 + "자세히 보기" 토글로 상세 일정 숨기면 인지 부담 감소 |
| **개선안** | ✅ 커리큘럼을 2단계로 분리:<br/>   - 1단계: 핵심 3가지만 큰 아이콘으로 (핵심강의/실습/발표)<br/>   - 2단계: "전체 일정 펼쳐보기" 버튼 → 클릭 시 캘린더 표시<br/>✅ 각 단계에 예상 시간 투자량 명시<br/>   예시) "주 3시간 투자로 완주 가능" |
| **예상 효과** | 50% 도달률 → 60%로 개선. 인지 과부하 감소로 스크롤 지속률 증가 |

---

### 6-5) 리뷰 섹션 (5,000-6,000px)

#### 현황
- 캐로셀 형식 9개 리뷰 카드
- 아바타 + 이름 + 기수 + 한 줄 후기
- 도달률: ~20%

#### 핵심 메시지
"실제 수강생들의 생생한 변화 스토리"

#### ✅ 잘 되고 있는 점
- 구체적인 기수와 스터디명 명시로 신뢰도 확보
- 캐로셀 디자인으로 많은 후기 효율적 노출

#### 💡 개선 기회

| 항목 | 내용 |
|------|------|
| **문제** | 20%만 도달하는 하단 섹션인데, 전환에 가장 효과적인 Social Proof가 묻혀있음 |
| **가설** | 리뷰를 상단(추천 대상 섹션 직후)으로 이동하면 70% 도달 지점에서 신뢰도 구축 가능 |
| **개선안** | ✅ 리뷰 섹션을 1,500px 위치(추천 대상 직후)로 이동<br/>✅ 상단에는 "베스트 3개 리뷰"만 노출<br/>✅ 각 리뷰에 "달성한 결과" 숫자 강조<br/>   예시) "업무 자동화로 월 120만원 절감" (숫자를 큰 폰트로) |
| **예상 효과** | 신뢰도 구축 시점 앞당김. 구매 전환 경로 단축으로 CVR 15~20% 증가 |

---

### 6-6) FAQ 섹션 (6,500-7,500px)

#### 현황
- 아코디언 형식 10개 질문
- 환불/수강신청/난이도 등 실용적 질문
- 도달률: ~10%

#### 핵심 메시지
"구매 전 궁금증 해소"

#### ✅ 잘 되고 있는 점
- 실제 고객 질문 반영
- 아코디언으로 공간 효율적 활용

#### 💡 개선 기회

| 항목 | 내용 |
|------|------|
| **문제** | 구매 장벽이 되는 핵심 질문(환불/난이도)이 10% 도달 구간에 위치 |
| **가설** | TOP 3 FAQ를 히어로 직후(~1,000px)에 Sticky Bar로 노출하면 초기 이탈 방지 |
| **개선안** | ✅ 히어로 CTA 아래 "자주 묻는 질문 3가지" 작은 패널 추가<br/>   - Q1: "AI 초보도 가능한가요?" → "입문 스터디 별도 운영"<br/>   - Q2: "환불 가능한가요?" → "시작 전 100% 환불"<br/>   - Q3: "시간 투자는 얼마나?" → "주 3시간"<br/>✅ "더 많은 FAQ 보기" 링크로 하단 전체 섹션 연결 |
| **예상 효과** | 초기 이탈 15% 감소. 구매 장벽 사전 제거로 CTA 클릭률 증가 |

