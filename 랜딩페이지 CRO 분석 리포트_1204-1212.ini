## 10) 추가 확인 필요 사항

<div className="checklist">

### 데이터로 확인 안 되는 부분

1. **실제 구매 전환율(CVR)**
   - #purchase 클릭 후 실제 결제 완료율은 얼마인가?
   - 장바구니 이탈률은?

2. **모바일 전환율 vs 데스크톱**
   - 모바일 26.7% 유입 중 전환율이 데스크톱보다 낮은가?
   - 모바일 최적화 우선순위 결정 필요

3. **A/B 테스트 히스토리**
   - 과거 19기 대비 20기 페이지 전환율 변화
   - 이전 헤드라인/CTA 테스트 결과

4. **사용자 세그먼트별 전환율**
   - 신규 방문자 vs 재방문자 CVR 차이
   - Direct 유입 vs 내부 유입 전환율

5. **가격 민감도 테스트**
   - 현재 299,000원 vs 269,000원 선택 비율
   - 멤버십(3기수) 구매율

6. **Exit Intent Survey**
   - 이탈 시점에 "왜 구매하지 않았나요?" 설문 결과
   - 가장 큰 구매 장벽 파악

7. **경쟁사 벤치마크**
   - 유사 교육 상품 랜딩페이지 전환율 평균
   - 업계 표준 대비 현재 위치

