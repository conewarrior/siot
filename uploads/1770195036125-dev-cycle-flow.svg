<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="phase4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: white; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: rgba(255,255,255,0.8); }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #64748B; }
    .input { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #334155; }
  </style>

  <!-- Background -->
  <rect width="800" height="320" fill="#F8FAFC"/>

  <!-- PRD Input -->
  <rect x="30" y="130" width="80" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="165" text-anchor="middle" class="input">PRD</text>

  <!-- Arrow 1 -->
  <path d="M115 160 L145 160" stroke="#CBD5E1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="145,155 155,160 145,165" fill="#CBD5E1"/>

  <!-- Phase 1: PRD to Dev -->
  <rect x="160" y="100" width="140" height="120" rx="12" fill="url(#phase1)" filter="url(#shadow)"/>
  <text x="230" y="135" text-anchor="middle" class="title">Phase 1</text>
  <text x="230" y="155" text-anchor="middle" class="subtitle">PRD → Dev Guide</text>
  <rect x="175" y="170" width="110" height="36" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="230" y="193" text-anchor="middle" class="subtitle">prd-to-dev</text>

  <!-- Arrow 2 -->
  <path d="M305 160 L335 160" stroke="#CBD5E1" stroke-width="2" fill="none"/>
  <polygon points="335,155 345,160 335,165" fill="#CBD5E1"/>

  <!-- Phase 2: Parallel Dev -->
  <rect x="350" y="100" width="140" height="120" rx="12" fill="url(#phase2)" filter="url(#shadow)"/>
  <text x="420" y="135" text-anchor="middle" class="title">Phase 2</text>
  <text x="420" y="155" text-anchor="middle" class="subtitle">병렬 개발</text>
  <rect x="365" y="170" width="110" height="36" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="420" y="193" text-anchor="middle" class="subtitle">parallel-dev</text>

  <!-- Arrow 3 -->
  <path d="M495 160 L525 160" stroke="#CBD5E1" stroke-width="2" fill="none"/>
  <polygon points="525,155 535,160 525,165" fill="#CBD5E1"/>

  <!-- Phase 3: Review -->
  <rect x="540" y="100" width="140" height="120" rx="12" fill="url(#phase3)" filter="url(#shadow)"/>
  <text x="610" y="135" text-anchor="middle" class="title">Phase 3</text>
  <text x="610" y="155" text-anchor="middle" class="subtitle">자동 리뷰</text>
  <rect x="555" y="170" width="110" height="36" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="610" y="193" text-anchor="middle" class="subtitle">reviewer</text>

  <!-- Arrow 4 -->
  <path d="M685 160 L715 160" stroke="#CBD5E1" stroke-width="2" fill="none"/>
  <polygon points="715,155 725,160 715,165" fill="#CBD5E1"/>

  <!-- Phase 4: Codify -->
  <rect x="730" y="130" width="50" height="60" rx="8" fill="url(#phase4)" filter="url(#shadow)"/>
  <text x="755" y="155" text-anchor="middle" class="subtitle" style="font-size:9px">CLAUDE</text>
  <text x="755" y="168" text-anchor="middle" class="subtitle" style="font-size:9px">.md</text>

  <!-- Labels -->
  <text x="230" y="250" text-anchor="middle" class="label">작업 분해</text>
  <text x="420" y="250" text-anchor="middle" class="label">N개 동시 실행</text>
  <text x="610" y="250" text-anchor="middle" class="label">검토 + 수정</text>
  <text x="755" y="250" text-anchor="middle" class="label">학습 기록</text>

  <!-- Phase indicators -->
  <circle cx="230" cy="70" r="16" fill="#3B82F6"/>
  <text x="230" y="75" text-anchor="middle" style="font-family: system-ui; font-size: 12px; font-weight: 600; fill: white;">1</text>

  <circle cx="420" cy="70" r="16" fill="#8B5CF6"/>
  <text x="420" y="75" text-anchor="middle" style="font-family: system-ui; font-size: 12px; font-weight: 600; fill: white;">2</text>

  <circle cx="610" cy="70" r="16" fill="#F97316"/>
  <text x="610" y="75" text-anchor="middle" style="font-family: system-ui; font-size: 12px; font-weight: 600; fill: white;">3</text>

  <circle cx="755" cy="100" r="16" fill="#10B981"/>
  <text x="755" y="105" text-anchor="middle" style="font-family: system-ui; font-size: 12px; font-weight: 600; fill: white;">4</text>
</svg>